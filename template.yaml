AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Compact player catalog and fantasy decision APIs

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    MemorySize: 256
    Tracing: Active
  Api:
    MinimumCompressionSize: 1024
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,If-None-Match'"
      AllowOrigin: "'*'"

Resources:
  PlayersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  PlayerCatalogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldCatalogVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
      VersioningConfiguration:
        Status: Enabled

  BuildPlayerCatalogFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/player_catalog/
      Handler: app.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          CATALOG_BUCKET: !Ref PlayerCatalogBucket
          CATALOG_KEY: players/v1/catalog.json
          PLAYERS_TABLE: !Ref PlayersTable
      Policies:
        - S3WritePolicy:
            BucketName: !Ref PlayerCatalogBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: cron(17 8 * * ? *)
            Enabled: true

  GetPlayersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/get_catalog/
      Handler: app.lambda_handler
      Timeout: 10
      Environment:
        Variables:
          CATALOG_BUCKET: !Ref PlayerCatalogBucket
          CATALOG_KEY: players/v1/catalog.json
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref PlayerCatalogBucket
      Events:
        GetPlayers:
          Type: Api
          Properties:
            Path: /players
            Method: GET

  ComparePlayersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/compare_players/
      Handler: app.lambda_handler
      Timeout: 20
      Environment:
        Variables:
          NFL_SEASON: '2026'
      Policies:
        - Statement:
            Effect: Allow
            Action: ssm:GetParameter
            Resource: arn:aws:ssm:*:*:parameter/fantasy-ai/openai_api_key
      Events:
        ComparePlayers:
          Type: Api
          Properties:
            Path: /compare
            Method: POST

  KeeperRecommendationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/keeper_recommendations/
      Handler: app.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          NFL_SEASON: '2026'
      Policies:
        - Statement:
            Effect: Allow
            Action: ssm:GetParameter
            Resource: arn:aws:ssm:*:*:parameter/fantasy-ai/openai_api_key
      Events:
        KeeperRecommendations:
          Type: Api
          Properties:
            Path: /keepers
            Method: POST

Outputs:
  ApiEndpoint:
    Description: Base URL for the mobile app
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  CatalogBuilderFunction:
    Description: Invoke once after the first deployment to seed the catalog
    Value: !Ref BuildPlayerCatalogFunction
  PlayersTableName:
    Description: Normalized Sleeper player records
    Value: !Ref PlayersTable
